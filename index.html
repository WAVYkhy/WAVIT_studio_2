<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B3RKCSSGB4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B3RKCSSGB4');
  </script>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAVIT_studio</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #fbfbfc;
      font-family: sans-serif;
    }
    .loader {
      font-size: 14px;
      letter-spacing: 2px;
      color: #8c8c8c;
      animation: pulse 1.5s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 3가지 테마 중 하나를 랜덤으로 선택
      const themes = [
        'theme_editorial.html', // 1. 기존 스타일
        'theme_brutalist.html', // 2. 사이버 브루탈리즘 스타일
        'pastel_retro_desktop.html' // 3. 파스텔 레트로 데스크톱 스타일
      ];
      
      const urlParams = new URLSearchParams(window.location.search);
      const exclude = urlParams.get('exclude');
      
      // 새로고침 시 이전에 머물던 테마를 제외한 목록에서만 랜덤 선택
      const availableThemes = exclude ? themes.filter(t => t !== exclude) : themes;
      const randomIndex = Math.floor(Math.random() * availableThemes.length);
      const selectedTheme = availableThemes[randomIndex];
      
      // GA4로 어떤 테마가 배정되었는지 이벤트 전송 (A/B 테스트 분석용)
      if (typeof window.gtag === 'function') {
        window.gtag('event', 'theme_assignment', {
          'assigned_theme': selectedTheme
        });
      }

      // 선택된 테마 페이지로 히스토리를 덮어쓰며 이동 (뒤로가기 시 무한 루프 방지)
      window.location.replace(selectedTheme);
    });
  </script>
</head>
<body>
  <div class="loader">INITIALIZING...</div>
</body>
</html>
